# Legacy compatibility aggregate.
# Runtime source of truth for stakeholder profiles lives under config/runtime/stakeholder-profiles/.
# Stakeholder profiles for digest personalization
# ─────────────────────────────────────────────────────────────────────
# Each profile defines: who gets this digest, what they care about,
# how to filter and frame content for them.
#
# Used by: prompts/digest_personalizer.md
# Activated by: pipeline.stakeholder_personalization.enabled = true
# ─────────────────────────────────────────────────────────────────────

profiles:

  # ─────────────────────────────────────────────────────────────────
  # DEFAULT — полная версия, как сейчас. Все стейкхолдеры.
  # Используется когда personalization отключена или профиль не задан.
  # ─────────────────────────────────────────────────────────────────
  default:
    name: "PropTech Monitor (базовый)"
    description: >
      Стандартный дайджест для команды Авито Недвижимость.
      Охватывает все темы, полная аналитика, без фильтрации по аудитории.
    audience_hint: "Все подписчики"
    min_priority_score: 55
    max_top_items: 5
    max_weak_signals: 4
    topic_filter: []  # пустой = все темы
    lens_weights:     # веса совпадают с глобальными scoring.weights
      marketplace_relevance: 0.35
      event_scale: 0.25
      portability_to_avito: 0.20
      urgency: 0.10
      novelty: 0.10
    format:
      avito_section_label: "Для Авито"
      include_sections:
        - top_news
        - what_to_watch
        - weak_signals
      detail_level: standard    # standard | brief | detailed
      max_chars_per_item: 600
    delivery:
      telegram_profile: telegram_digest
      # thread_id_env: ...   # раскомментировать если разные треды

  # ─────────────────────────────────────────────────────────────────
  # PRODUCT — продуктовые менеджеры и дизайнеры
  # ─────────────────────────────────────────────────────────────────
  product:
    name: "PropTech Monitor | Продукт"
    description: >
      Фокус на продуктовых запусках, UX-паттернах, AI-функциях,
      качестве листингов и инструментах для агентов.
      Углублённая секция «Что попробовать прямо сейчас».
    audience_hint: "Product, Design, UX"
    min_priority_score: 50
    max_top_items: 5
    max_weak_signals: 3
    topic_filter:
      include:
        - product_launch
        - product_update
        - ai_search
        - recommendations
        - listing_quality
        - pre_market_listings
        - mobile_product
        - lead_qualification
        - trust_safety
        - ai_ml
      # Исключить чисто финансовые и кадровые
      exclude:
        - earnings_report
        - leadership_change
        - market_data_release
    lens_weights:
      marketplace_relevance: 0.30
      event_scale: 0.15
      portability_to_avito: 0.35  # повышен: продукту важнее применимость
      urgency: 0.10
      novelty: 0.10
    format:
      avito_section_label: "Для команды продукта"
      include_sections:
        - top_news
        - try_now          # новая секция: конкретные ссылки на live-продукты для теста
        - what_to_watch
        - weak_signals
      detail_level: detailed
      max_chars_per_item: 800
      extra_instructions: >
        В блоке «Для команды продукта» давай конкретный action:
        - если продукт live — ссылку для теста
        - если есть видео/скриншот — упомяни
        - если есть UX-паттерн применимый для Авито — назови конкретную фичу/экран
    delivery:
      telegram_profile: telegram_digest
      # thread_id_env: TELEGRAM_THREAD_PRODUCT

  # ─────────────────────────────────────────────────────────────────
  # STRATEGY — бизнес-стратегия, топ-менеджмент
  # ─────────────────────────────────────────────────────────────────
  strategy:
    name: "PropTech Monitor | Стратегия"
    description: >
      Фокус на M&A, рыночных сдвигах, конкурентных угрозах,
      регуляторных изменениях и глобальных трендах.
      Краткий формат, стратегические выводы без деталей UX.
    audience_hint: "Strategy, Business Development, Leadership"
    min_priority_score: 65   # выше порог — только значимые события
    max_top_items: 4
    max_weak_signals: 2
    topic_filter:
      include:
        - m_and_a
        - competitive_move
        - market_dynamics
        - regulation
        - funding
        - listing_war
        - monetization
        - subscriptions
        - agent_relations
        - consumer_behaviour
        - macro_market
      exclude:
        - mobile_product
        - talent_leadership  # кадровые ротации только если CEO-уровень
    lens_weights:
      marketplace_relevance: 0.30
      event_scale: 0.35     # повышен: стратегии важен масштаб события
      portability_to_avito: 0.20
      urgency: 0.10
      novelty: 0.05
    format:
      avito_section_label: "Стратегический вывод для Авито"
      include_sections:
        - top_news
        - strategic_implications  # новая секция: 2-3 bullet вывода для Авито
        - what_to_watch
      detail_level: brief
      max_chars_per_item: 400
      extra_instructions: >
        В блоке «Стратегический вывод для Авито» давай конкретное утверждение:
        - угроза / возможность / нейтрально
        - горизонт: немедленно / 6-12 мес / 1-3 года
        - рекомендация: watch / act / ignore
    delivery:
      telegram_profile: telegram_digest
      # thread_id_env: TELEGRAM_THREAD_STRATEGY

  # ─────────────────────────────────────────────────────────────────
  # COMMERCIAL — монетизация, продажи, работа с агентами
  # ─────────────────────────────────────────────────────────────────
  commercial:
    name: "PropTech Monitor | Коммерция"
    description: >
      Фокус на новых форматах монетизации, моделях подписки,
      paid visibility продуктах, динамике отношений с агентами и ARPU.
    audience_hint: "Monetization, Sales, Agent Relations, Revenue"
    min_priority_score: 55
    max_top_items: 4
    max_weak_signals: 3
    topic_filter:
      include:
        - monetization
        - paid_visibility
        - subscriptions
        - agent_relations
        - lead_qualification
        - listing_war          # влияет на supply и агентскую лояльность
        - funding              # как конкуренты капитализируются
        - m_and_a              # влияет на расстановку сил
        - transaction_tech     # ипотека, закрытие — смежные доходы
      exclude:
        - mobile_product
        - macro_market
        - talent_leadership
    lens_weights:
      marketplace_relevance: 0.40  # повышен
      event_scale: 0.20
      portability_to_avito: 0.25
      urgency: 0.10
      novelty: 0.05
    format:
      avito_section_label: "Для коммерческой команды"
      include_sections:
        - top_news
        - monetization_signals  # новая секция: паттерны монетизации с цифрами
        - what_to_watch
        - weak_signals
      detail_level: standard
      max_chars_per_item: 500
      extra_instructions: >
        В блоке «Для коммерческой команды» выделяй:
        - конкретные форматы (Showcase, Premier Agent, Enhanced Markets и аналоги)
        - ценовые диапазоны и ARPU-эффекты, если известны
        - что агенты принимают охотно, а что отвергают
    delivery:
      telegram_profile: telegram_digest
      # thread_id_env: TELEGRAM_THREAD_COMMERCIAL

  # ─────────────────────────────────────────────────────────────────
  # TECH — инженерия, ML, data science
  # ─────────────────────────────────────────────────────────────────
  tech:
    name: "PropTech Monitor | Технологии"
    description: >
      Фокус на AI/ML подходах, поисковых архитектурах, качестве данных,
      API-паттернах, антифроде и tech-стеке конкурентов.
    audience_hint: "Engineering, ML, Data Science, Platform"
    min_priority_score: 45    # ниже порог — технические слабые сигналы тоже важны
    max_top_items: 5
    max_weak_signals: 4
    topic_filter:
      include:
        - ai_ml
        - ai_search
        - data_infra
        - recommendations
        - trust_safety
        - mobile_product      # app updates как сигнал о приоритетах продукта
        - listing_quality     # data enrichment tech
        - transaction_tech
      exclude:
        - funding
        - market_dynamics
        - macro_market
        - leadership_change
    lens_weights:
      marketplace_relevance: 0.25
      event_scale: 0.15
      portability_to_avito: 0.30  # применимость важнее масштаба
      urgency: 0.10
      novelty: 0.20              # повышен: новизна подхода важна инженерам
    format:
      avito_section_label: "Техническая применимость для Авито"
      include_sections:
        - top_news
        - what_to_watch
        - weak_signals
        - tech_patterns       # новая секция: извлечённые паттерны и гипотезы для реализации
      detail_level: detailed
      max_chars_per_item: 700
      extra_instructions: >
        В блоке «Техническая применимость для Авито» давай:
        - какой технический подход использован (если известен)
        - гипотезу о реализации («вероятно LLM + re-ranking», «скорее всего vector search»)
        - конкретный эксперимент или PoC который можно сделать за sprint
    delivery:
      telegram_profile: telegram_digest
      # thread_id_env: TELEGRAM_THREAD_TECH
