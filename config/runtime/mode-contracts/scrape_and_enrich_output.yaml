mode_id: scrape_and_enrich

purpose:
  - fetch article body content only for shortlisted items that passed the full-text gate
  - normalize fetch outcomes into a compact downstream-ready enriched record
  - capture evidence and story linkage without performing final digest selection

depends_on:
  full_text_gate_contract: ./config/runtime/mode-contracts/scrape_and_enrich_gate.yaml

full_text_authority:
  only_full_text_consumer_mode: scrape_and_enrich
  forbidden_other_full_text_consumers:
    - monitor_sources
    - build_daily_digest
    - build_weekly_digest
    - review_digest
    - breaking_alert
    - stakeholder_fanout

allowed_runtime_inputs:
  - fetch queue derived from shortlisted_item[] only
  - runner article prefetch result/summary manifests for the current run only
  - runner article files referenced by matched manifest entries only
  - resolved adapter files from source_map
  - shared briefs

processing_stages:
  - name: fetch_and_normalize_body
    outputs:
      - body_status
      - article_file
      - normalized_text_or_fallback
  - name: extract_and_classify
    outputs:
      - companies
      - regions
      - topic_tags
      - event_type
      - source_quality
  - name: score_and_summarize
    outputs:
      - priority_score
      - confidence
      - analyst_summary
      - why_it_matters
      - avito_implication
  - name: evidence_and_story_update
    outputs:
      - evidence_points
      - story_id
      - story_brief updates

body_status_policy:
  full:
    trigger: body text extracted and above the minimum useful-body threshold, either by this mode or by the runner article prefetch stage
    confidence_range: [0.70, 1.00]
    evidence_points_rule: 2_to_4_required
    article_file_rule: non_null_required
  snippet_fallback:
    trigger: full body unavailable or below threshold, but snippet/open metadata still exists
    confidence_range: [0.45, 0.69]
    evidence_points_rule: 1_to_2_allowed
    article_file_rule: non_null_preferred
  paywall_stub:
    trigger: paywall, access denial, or stub page without reliable body text
    confidence_range: [0.20, 0.44]
    evidence_points_rule: zero_required
    article_file_rule: nullable

runner_article_prefetch_contract:
  result_manifest:
    path_template: ./.state/codex-runs/{runner_run_id}-article-prefetch-result.json
    allowed_entry_match_keys:
      - url
      - canonical_url
    required_entry_fields:
      - source_id
      - url
      - canonical_url
      - title
      - published
      - body_status_hint
      - article_file
      - fetch_method
      - text_char_count
      - soft_fail
      - failure_class
  summary_manifest:
    path_template: ./.state/codex-runs/{runner_run_id}-article-prefetch-summary.json
    required_fields:
      - shortlisted_count
      - attempted_count
      - full_count
      - snippet_fallback_count
      - paywall_stub_count
      - result_path
      - summary_path
  consumption_rules:
    - match every result entry to the current-run shortlist before use
    - read article_file only for matched entries with body_status_hint = full
    - ignore unmatched manifest entries and record a compact contract warning
    - do not pass article body text to downstream digest or review modes

evidence_completeness_policy:
  all_snippet_fallback:
    trigger: every enriched_item emitted for the digest window has body_status = snippet_fallback
    required_enrichment_manifest_fields:
      evidence_completeness: all_snippet_fallback
      downstream_digest_gate: partial_digest
    downstream_rule: build_daily_digest may render only as partial_digest and must preserve compact evidence notes plus durable source URLs
    non_goals:
      - do not fetch bodies for non-shortlisted items to improve evidence completeness
      - do not pass full article text to downstream digest modes
  mixed_or_full_evidence:
    trigger: at least one enriched_item emitted for the digest window has body_status = full
    downstream_rule: normal selection rules apply, subject to item-level confidence and evidence quality

downstream_required_enriched_fields:
  - run_id
  - source_id
  - url
  - canonical_url
  - title
  - published
  - enriched_at
  - companies
  - regions
  - topic_tags
  - event_type
  - priority_score
  - confidence
  - analyst_summary
  - why_it_matters
  - avito_implication
  - story_id
  - body_status
  - article_file
  - evidence_points
  - source_quality

output_contract:
  enriched_shard:
    schema: enriched_item[]
    collection: enriched
    path_template: ./.state/enriched/{run_date}/{run_id}.json
  story_updates:
    schema: story_brief
    collection: stories
    path_template: ./.state/stories/{first_seen_month}/{story_id}.json
  run_manifest:
    schema: run_manifest
    collection: runs
    path_template: ./.state/runs/{run_date}/{run_id}.json

non_goals:
  - no final story ranking
  - no daily or weekly digest rendering
  - no stakeholder personalization
