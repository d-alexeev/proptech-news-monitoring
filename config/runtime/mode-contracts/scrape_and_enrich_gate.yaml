mode_id: scrape_and_enrich

purpose:
  - accept only shortlisted items as eligible full-text fetch inputs
  - resolve source adapters from actually encountered shortlist source IDs
  - build the fetch queue for later enrichment stages

shared_context:
  briefs:
    - ./cowork/shared/mission_brief.md
    - ./cowork/shared/taxonomy_and_scoring.md
    - ./cowork/shared/contracts.md
    - ./cowork/shared/change_request_policy.md
  adapter_source_map: ./cowork/adapters/source_map.md

upstream_gate:
  allowed_collection: shortlists
  allowed_schema: shortlisted_item[]
  allowed_item_conditions:
    - triage_decision == shortlist
    - item exists in the shortlist shard for the current run
  forbidden_fetch_initiators:
    - ./.state/raw/
    - dropped or filtered monitor_sources candidates
    - digest markdown files
    - story index entries without shortlist membership

allowed_runtime_inputs:
  - shortlist shard for the current run
  - current-run article prefetch result manifest under ./.state/codex-runs/*-article-prefetch-result.json
  - current-run article prefetch summary under ./.state/codex-runs/*-article-prefetch-summary.json
  - article artifacts under ./.state/articles/ only when referenced by the current-run article prefetch manifest and matched to a shortlisted URL
  - shared briefs
  - source map
  - only adapters resolved from source IDs present in the shortlist shard

forbidden_runtime_inputs:
  - ./.state/raw/
  - article artifacts not referenced by the current-run article prefetch manifest
  - article prefetch manifests from prior runs or unrelated schedules
  - non-shortlisted raw candidates
  - digest archive
  - stakeholder profiles
  - whole adapter directory

forbidden_runtime_actions:
  - edit prompt files
  - edit config files
  - edit adapter files
  - create hidden local overrides for future runs

adapter_resolution:
  source_map: ./cowork/adapters/source_map.md
  steps:
    - collect unique source_id values from shortlisted items only
    - resolve each source_id through the source map
    - skip adapter loading for source IDs mapped to none
    - load each non-none adapter at most once per run
    - surface a contract error if a shortlisted source_id has no resolution entry
  expected_outputs:
    - fetch_queue_urls
    - resolved_adapter_files
    - baseline_source_ids

gate_outcome:
  fetch_queue_scope:
    description: only shortlisted items become eligible for body fetch
  article_prefetch_scope:
    description: runner-provided article_file inputs are eligible only after url or canonical_url matches the current-run shortlist
  excluded_scope:
    description: noisy or irrelevant candidates stay outside the fetch queue

change_request_output:
  schema: change_request
  collection: change_requests
  path_template: ./.state/change-requests/{request_date}/{request_id}.json
  optional: true

change_request_escalation:
  enabled: true
  policy_ref: ./cowork/shared/change_request_policy.md
  allowed_failure_types:
    - scrape_failure
    - adapter_gap
  trigger_conditions:
    - shortlisted fetch fails beyond contract-allowed fallback behavior
    - resolved adapter is insufficient to extract or normalize required body content
  expected_fields:
    - run_id
    - mode
    - stage
    - source_id
    - url
    - failure_type
    - workaround_found
    - suggested_target_files
    - tests_to_add

non_goals:
  - no enrichment output contract
  - no article markdown storage format
  - no evidence extraction policy
