mode_id: monitor_sources

purpose:
  - discover candidate items from the configured source group
  - perform primary triage on title, metadata, and available snippet
  - emit raw shard, shortlist shard, and run manifest

shared_context:
  briefs:
    - ./cowork/shared/mission_brief.md
    - ./cowork/shared/taxonomy_and_scoring.md
    - ./cowork/shared/contracts.md
    - ./cowork/shared/change_request_policy.md

static_config_inputs:
  required:
    - ./config/runtime/source-groups/{group_id}.yaml
    - ./config/runtime/runtime_thresholds.yaml
  conditional:
    - ./cowork/adapters/source_map.md
    - ./cowork/adapters/{resolved_adapter}.md

runtime_state_inputs:
  checkpoints:
    description: compact last-success markers scoped to the current source group
    allowed_fields:
      - group_id
      - last_successful_run_id
      - last_successful_finished_at
      - per_source_latest_published
      - per_source_latest_url
  recent_story_index:
    description: compact lookup derived from recent story briefs for duplicate linking
    max_lookback_days: 30
    allowed_fields:
      - story_id
      - canonical_url
      - title_snapshot
      - last_seen
      - topic_tags
      - last_digest_refs

allowed_runtime_inputs:
  - source-group config for the current run
  - runtime thresholds
  - last checkpoint for the current source group
  - recent story index
  - only adapters resolved for source IDs in the current run

forbidden_runtime_inputs:
  - ./.state/articles/
  - ./.state/enriched/
  - ./.state/briefs/
  - ./.state/reviews/
  - stakeholder profiles
  - digest markdown archive
  - full article bodies

forbidden_runtime_actions:
  - edit prompt files
  - edit config files
  - edit adapter files
  - create hidden local overrides for future runs

processing_stages:
  - name: discovery
    output: raw_candidate[]
  - name: primary_triage
    output: shortlist decisions on titles, metadata, and snippet only
  - name: duplicate_linking
    output: story_hint or dedupe_match when recent story index indicates related coverage
  - name: shortlist_emission
    output: shortlisted_item[]

source_runner_contract:
  primary_static_tool: ./tools/rss_fetch.py
  scheduled_prefetch:
    helper: ./tools/source_discovery_prefetch.py
    artifact_fields:
      - fetch_result_path
      - dns_check_path
      - summary_path
    handling:
      - when: "prefetch summary is provided by the schedule wrapper"
        action: consume_prefetch_artifacts_as_static_source_runner_output
        note: Do not repeat static network fetches from inside the inner codex exec sandbox.
      - when: "prefetch result contains large kind=http body fields"
        action: use_as_local_evidence_reference_not_prompt_context_dump
        note: Summarize adapter-relevant listing markers, titles, links, dates, and compact snippets only.
      - when: "prefetch skipped_sources contains fetch_strategy=chrome_scrape"
        action: mark_browser_sources_not_attempted_until_browser_artifact_exists
        note: Static prefetch does not make browser-backed discovery canonical.
  batch_summary_fields:
    - fetched_at
    - batch_status
    - failure_class
    - run_failure
    - results
  batch_status_values:
    - success
    - partial_success
    - soft_failed
    - failed
    - environment_failure
  environment_failure_classes:
    - global_dns_resolution_failure
  source_failure_classes:
    - timeout
    - blocked_or_paywall
    - rate_limited
    - anti_bot
    - origin_blocked
    - selector_miss
    - stale_source
    - http_error
    - feed_parse_error
    - dns_resolution
    - network_error
  handling_rules:
    - condition: "batch_status == 'environment_failure' and failure_class == 'global_dns_resolution_failure'"
      action: emit_failed_run_manifest_without_canonical_empty_shards
      note: DNS failure across all fetchable configured sources, or all except a known costar_homes timeout, is a runner/network failure, not a no-news source result.
    - condition: "one or more results have soft_fail and batch_status != 'environment_failure'"
      action: preserve_source_level_outcome_and_continue_when_other_sources_succeeded
      note: Individual timeouts, blocking, selector misses, and rate limits remain source-level outcomes.
    - condition: "source_id == 'costar_homes' and soft_fail == 'timeout' and batch_status != 'environment_failure'"
      action: treat_as_transient_source_soft_fail
      note: Do not escalate the known transient Costar timeout unless resolver failures affect the batch globally.
    - condition: "operator fallback evidence exists after source runner failure"
      action: mark_manifest_partial_or_non_canonical
      note: Web fallback must not be represented as canonical configured-source discovery.

output_contract:
  raw_shard:
    schema: raw_candidate[]
    collection: raw
    path_template: ./.state/raw/{run_date}/{run_id}.json
  shortlist_shard:
    schema: shortlisted_item[]
    collection: shortlists
    path_template: ./.state/shortlists/{run_date}/{run_id}.json
  run_manifest:
    schema: run_manifest
    collection: runs
    path_template: ./.state/runs/{run_date}/{run_id}.json
  change_request:
    schema: change_request
    collection: change_requests
    path_template: ./.state/change-requests/{request_date}/{request_id}.json
    optional: true

change_request_escalation:
  enabled: true
  policy_ref: ./cowork/shared/change_request_policy.md
  allowed_failure_types:
    - blocked_or_manual_source
    - runner_environment_failure
  trigger_conditions:
    - configured source resolves to a blocked/manual access adapter or equivalent runtime limitation
    - declared discovery path cannot proceed without manual or out-of-band access
    - global runner/network failure prevents configured source discovery and requires operator remediation
  suppression:
    # Sources declared with blocked_mode=manual_only_permanent (see
    # cowork/adapters/blocked_manual_access.md) do not emit a change_request
    # every run; the runner emits a manual_intake_reminder at the declared
    # cadence instead. A change_request is still required if the manual-intake
    # backlog exceeds 2× cadence or the landing URL stops resolving.
    - condition: "source.blocked_mode == 'manual_only_permanent'"
      action: emit_manual_intake_reminder_on_cadence_instead
      cadence_field: manual_intake_cadence_days
      last_checked_field: manual_intake_last_checked
      fallback_change_request_when: backlog_exceeds_2x_cadence
  expected_fields:
    - run_id
    - mode
    - stage
    - source_id
    - url
    - failure_type
    - workaround_found
    - suggested_target_files
    - tests_to_add

duplicate_policy:
  exact_canonical_match:
    action: filter_or_link
    note: raw candidate may still be recorded, but shortlist is optional
  same_story_follow_up:
    action: link_via_story_hint
    note: keep the item if the update is materially new, otherwise drop at triage
  unavailable_story_match:
    action: continue_without_story_hint

non_goals:
  - no full-text fetch
  - no article markdown creation
  - no semantic enrichment
  - no digest assembly
