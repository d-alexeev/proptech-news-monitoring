fixture_id: runner_integration_map
mode_id: runner_dry_run_integration
description: >
  Offline RT-M6 source-by-source dry-run map for the minimal Codex runner tool
  set. This fixture proves current daily_core and weekly_context source groups
  resolve to exactly one primary minimal tool path without live network fetch.

validation_contract:
  command: python3 tools/validate_runtime_artifacts.py --check runner-integration
  no_live_network_required: true
  no_telegram_delivery: true
  no_secrets_required: true
  no_captcha_or_proxy_required: true
  primary_tool_path_policy: exactly_one_per_source
  blocked_manual_policy: represented_explicitly_and_not_fetched_when_configured

strategy_family_coverage:
  rss:
    primary_tool_path: HTTP/RSS fetcher
    fixture_coverage:
      - config/runtime/mode-fixtures/runner_fetcher_contract_inman.yaml
      - tools/test_rss_fetch.py
  html_scrape:
    primary_tool_path: HTTP/RSS fetcher
    fixture_coverage:
      - tools/test_rss_fetch.py
  itunes_api:
    primary_tool_path: HTTP/RSS fetcher
    fixture_coverage:
      - tools/test_rss_fetch.py
  chrome_scrape:
    primary_tool_path: Browser fallback
    fixture_coverage:
      - config/runtime/mode-fixtures/runner_browser_fallback_similarweb.yaml
  blocked:
    primary_tool_path: No fetch / manual intake policy
    fixture_coverage:
      - config/runtime/mode-fixtures/monitor_sources_blocked_manual_change_request.yaml
  pdf_enrichment:
    optional_tool_path: PDF text extractor
    fixture_coverage:
      - config/runtime/mode-fixtures/runner_pdf_extract_rightmove.yaml
      - tools/test_pdf_extract.py

sources:
  - group_id: daily_core
    source_id: aim_group_real_estate_intelligence
    fetch_strategy: rss
    primary_tool_path: HTTP/RSS fetcher
    invocation_kind: rss
    invocation_url_field: rss_feed
    adapter: none
    optional_fallback: null
    manual_policy: null
    fixture_coverage:
      - config/runtime/mode-fixtures/runner_fetcher_contract_inman.yaml
      - tools/test_rss_fetch.py
    live_residual_risk: RSS endpoint availability, feed item freshness, or origin rate limits can still fail during RT-M7 live testing.

  - group_id: daily_core
    source_id: onlinemarketplaces
    fetch_strategy: chrome_scrape
    primary_tool_path: Browser fallback
    invocation_kind: browser
    invocation_url_field: landing_urls
