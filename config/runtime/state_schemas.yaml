version: 1

artifacts:
  raw_candidate:
    shard_collection: raw
    producer_modes: [monitor_sources]
    consumer_modes: [monitor_sources]
    required_fields:
      - name: run_id
        type: string
      - name: source_id
        type: string
      - name: group_id
        type: string
      - name: url
        type: string
      - name: canonical_url
        type: string
      - name: title
        type: string
      - name: published
        type: date
      - name: discovered_at
        type: datetime
      - name: fetch_strategy
        type: enum[rss,itunes_api,html_scrape,chrome_scrape,blocked]
    optional_fields:
      - name: source_name
        type: string
      - name: landing_url
        type: string
      - name: raw_snippet
        type: string
      - name: author
        type: string
      - name: region_hint
        type: string
      - name: story_hint
        type: string
      - name: dedupe_key
        type: string
      - name: metadata
        type: map

  shortlisted_item:
    shard_collection: shortlists
    producer_modes: [monitor_sources]
    consumer_modes: [scrape_and_enrich]
    required_fields:
      - name: run_id
        type: string
      - name: source_id
        type: string
      - name: url
        type: string
      - name: canonical_url
        type: string
      - name: title
        type: string
      - name: published
        type: date
      - name: shortlisted_at
        type: datetime
      - name: triage_decision
        type: enum[shortlist]
      - name: shortlist_reason
        type: string
      - name: provisional_priority
        type: integer
      - name: fetch_strategy
        type: string
    optional_fields:
      - name: raw_snippet
        type: string
      - name: story_hint
        type: string
      - name: companies_hint
        type: list[string]
      - name: topic_hint
        type: list[string]
      - name: dedupe_match
        type: map
      - name: notes
        type: string

  enriched_item:
    shard_collection: enriched
    producer_modes: [scrape_and_enrich]
    consumer_modes: [build_daily_digest, build_weekly_digest, breaking_alert]
    required_fields:
      - name: run_id
        type: string
      - name: source_id
        type: string
      - name: url
        type: string
      - name: canonical_url
        type: string
      - name: title
        type: string
      - name: published
        type: date
      - name: enriched_at
        type: datetime
      - name: companies
        type: list[string]
      - name: regions
        type: list[string]
      - name: topic_tags
        type: list[string]
      - name: event_type
        type: string_or_null
      - name: priority_score
        type: integer
      - name: confidence
        type: float
      - name: analyst_summary
        type: string
      - name: why_it_matters
        type: string
      - name: avito_implication
        type: string
      - name: story_id
        type: string
      - name: body_status
        type: enum[full,snippet_fallback,paywall_stub]
      - name: article_file
        type: string_or_null
      - name: evidence_points
        type: list[string]
      - name: source_quality
        type: enum[primary_source,industry_analysis,expert_analysis,trade_media,behavioral_signal,mobile_store,manual_blocked]
      - name: lead_image
        type: object
    optional_fields:
      - name: raw_snippet
        type: string
      - name: stakeholder_scores
        type: map
    notes:
      - enriched_item is the compact downstream-ready record for daily, weekly, and alert modes
      - confidence policy and evidence cardinality are defined in config/runtime/mode-contracts/scrape_and_enrich_output.yaml
      - lead_image stores compact metadata only; image binaries are not part of enriched_item state
    lead_image:
      type: object
      required: false
      fields:
        status: enum[available,unavailable]
        url: string|null
        source: enum[og_image,twitter_image,image_src,article_image,none]
        alt: string|null
        content_type: string|null
        width: integer|null
        height: integer|null

  story_brief:
    shard_collection: stories
    producer_modes: [scrape_and_enrich]
    consumer_modes: [monitor_sources, build_daily_digest, build_weekly_digest, breaking_alert]
    required_fields:
      - name: story_id
        type: string
      - name: canonical_url
        type: string
      - name: title_snapshot
        type: string
      - name: first_seen
        type: date
      - name: last_seen
        type: date
      - name: first_seen_month
        type: string
      - name: source_ids
        type: list[string]
      - name: companies
        type: list[string]
      - name: topic_tags
        type: list[string]
    optional_fields:
      - name: regions
        type: list[string]
      - name: event_types_seen
        type: list[string]
      - name: latest_priority_score
        type: integer
      - name: last_digest_refs
        type: list[string]
      - name: summary_line
        type: string
      - name: notes
        type: string
    legacy_dependencies: none

  daily_brief:
    shard_collection: briefs_daily
    producer_modes: [build_daily_digest]
    consumer_modes: [build_weekly_digest, review_digest, stakeholder_fanout]
    required_fields:
      - name: brief_id
        type: string
      - name: run_id
        type: string
      - name: digest_date
        type: date
      - name: delivery_profile
        type: string
      - name: generated_at
        type: datetime
      - name: story_ids
        type: list[string]
      - name: top_story_ids
        type: list[string]
      - name: weak_signal_ids
        type: list[string]
      - name: context_refs
        type: list[string]
      - name: section_order
        type: list[string]
      - name: story_cards
        type: list[map]
      - name: markdown_path
        type: string
    optional_fields:
      - name: selection_notes
        type: list[string]
      - name: delivery_metadata
        type: map
      - name: render_metadata
        type: map
    notes:
      - daily_brief is the machine-readable daily output for weekly synthesis, QA review, and stakeholder fanout
      - story_cards should contain compact story render units with at least story_id, section, title, priority_score, confidence, analyst_summary, why_it_matters, avito_implication, and context_refs

  weekly_brief:
    shard_collection: briefs_weekly
    producer_modes: [build_weekly_digest]
    consumer_modes: [review_digest, stakeholder_fanout]
    required_fields:
      - name: brief_id
        type: string
      - name: run_id
        type: string
      - name: week_id
        type: string
      - name: delivery_profile
        type: string
      - name: generated_at
        type: datetime
      - name: story_ids
        type: list[string]
      - name: top_story_ids
        type: list[string]
      - name: trend_ids
        type: list[string]
      - name: prior_week_refs
        type: list[string]
      - name: section_order
        type: list[string]
      - name: trend_cards
        type: list[map]
      - name: story_cards
        type: list[map]
      - name: markdown_path
        type: string
    optional_fields:
      - name: synthesis_notes
        type: list[string]
      - name: delivery_metadata
        type: map
    notes:
      - weekly_brief is the compact weekly output for downstream review and stakeholder fanout
      - trend_cards should contain compact trend render units with at least trend_id, title, supporting_story_ids, evidence_refs, why_it_matters, avito_implication, and horizon

  qa_review_report:
    shard_collection: reviews
    producer_modes: [review_digest]
    consumer_modes: []
    required_fields:
      - name: review_id
        type: string
      - name: parent_run_id
        type: string
      - name: review_kind
        type: enum[daily_digest,weekly_digest]
      - name: review_date
        type: date
      - name: generated_at
        type: datetime
      - name: target_digest_path
        type: string
      - name: target_brief_id
        type: string
      - name: missed_signals
        type: list[map]
      - name: duplication_risk
        type: list[map]
      - name: weak_reasoning
        type: list[map]
      - name: source_gaps
        type: list[map]
      - name: next_run_recommendations
        type: list[string]
    optional_fields:
      - name: target_delivery_profile
        type: string
      - name: critical_findings_count
        type: integer
      - name: warning_findings_count
        type: integer
      - name: summary
        type: string
      - name: review_notes
        type: list[string]
    notes:
      - qa_review_report is a QA-only artifact and must not replace the target digest
      - findings must be grouped into actionable categories rather than a rewritten editorial output

  run_manifest:
    shard_collection: runs
    producer_modes:
      - monitor_sources
      - scrape_and_enrich
      - build_daily_digest
      - review_digest
      - build_weekly_digest
      - breaking_alert
      - stakeholder_fanout
    consumer_modes: [review_digest]
    required_fields:
      - name: run_id
        type: string
      - name: mode
        type: string
      - name: started_at
        type: datetime
      - name: finished_at
        type: datetime
      - name: status
        type: enum[pending,running,completed,failed,partial]
      - name: inputs
        type: list[string]
      - name: outputs
        type: list[string]
    optional_fields:
      - name: source_groups
        type: list[string]
      - name: delivery_profile
        type: string
      - name: parent_run_id
        type: string
      - name: counts
        type: map
      - name: warnings
        type: list[string]
      - name: errors
        type: list[string]
      - name: operator_report
        type: map
      - name: notes
        type: list[string]
    status_compatibility:
      decision: keep_existing_enum
      enum_values: [pending, running, completed, failed, partial]
      rationale: Existing consumers may key off run_manifest.status, so WLH-M6 keeps the enum stable and adds operator_report for stage-specific readiness semantics.
      rule: run_manifest.status reports whether that mode finished its own work; operator_report reports whether the end-to-end weekday run is canonical, partial, blocked, validated, or delivered.
    operator_report_contract:
      final_weekday_report_fields:
        - source_discovery
        - enrichment
        - digest_generation
        - qa_review
        - telegram_delivery
      source_discovery:
        required_semantics:
          - status
          - canonical_source_complete
        status_values: [completed, partial, failed, skipped]
      enrichment:
        required_semantics:
          - status
          - evidence_completeness
        status_values: [completed, partial, failed, skipped]
      digest_generation:
        required_semantics:
          - status
          - digest_status
        status_values: [generated, blocked, failed, skipped]
        digest_status_values: [canonical_digest, partial_digest, non_canonical_digest]
      qa_review:
        required_semantics:
          - status
        status_values: [validated, warnings, failed, skipped]
      telegram_delivery:
        required_semantics:
          - status
          - delivered
        status_values:
          - delivered
          - dry_run
          - not_configured
          - delivery_failed_dns
          - delivery_failed_http
          - delivery_failed_api
          - delivery_failed_unknown
          - skipped
      telegram_preview:
        type: object
        required: false
        fields:
          status: enum[available,unavailable]
          preview_url: string|null
          source_story_id: string|null
          lead_image_url: string|null
          reason: string
      mixed_status_rule: A downstream build_daily_digest run may have status completed when it generated files, but partial upstream evidence must be surfaced in the final operator report. Source discovery canonical_source_complete is false only when configured source discovery itself is partial or failed; enrichment partiality does not force canonical_source_complete false. Partial enrichment affects enrichment.evidence_completeness, digest_generation.digest_status, overall_readiness, and final warnings.
      example_fixture: config/runtime/mode-fixtures/weekday_digest_mixed_status_operator_report.yaml
    legacy_dependencies: none
