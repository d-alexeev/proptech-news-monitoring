version: 1
runtime_source_of_truth: true

description: >
  Split runtime config for Claude Cowork jobs. Files under config/runtime/
  are the canonical runtime source of truth for source groups, thresholds,
  delivery bindings, and stakeholder profile definitions.

catalogs:
  monitor_list:
    path: ./monitor-list.json
    role: human_readable_catalog_export
    runtime_source_of_truth: false

legacy_bridges:
  monitoring_yaml:
    path: ./config/monitoring.yaml
    role: legacy_aggregate_reference
  stakeholders_yaml:
    path: ./config/stakeholders.yaml
    role: legacy_aggregate_reference

files:
  source_groups:
    daily_core: ./config/runtime/source-groups/daily_core.yaml
    weekly_context: ./config/runtime/source-groups/weekly_context.yaml
  thresholds: ./config/runtime/runtime_thresholds.yaml
  schedule_bindings: ./config/runtime/schedule_bindings.yaml
  state_layout: ./config/runtime/state_layout.yaml
  state_schemas: ./config/runtime/state_schemas.yaml
  state_fixtures:
    valid_artifacts: ./config/runtime/state-fixtures/valid_artifacts.yaml
    path_resolution: ./config/runtime/state-fixtures/path_resolution.yaml
  migration_plan: ./config/runtime/migration_plan.md
  migration_fixtures:
    recent_runs: ./config/runtime/migration-fixtures/recent_runs.yaml
    rollback_checklist: ./config/runtime/migration-fixtures/rollback_checklist.yaml
  mode_contracts:
    monitor_sources: ./config/runtime/mode-contracts/monitor_sources.yaml
    scrape_and_enrich_gate: ./config/runtime/mode-contracts/scrape_and_enrich_gate.yaml
    scrape_and_enrich_output: ./config/runtime/mode-contracts/scrape_and_enrich_output.yaml
    build_daily_digest_selection: ./config/runtime/mode-contracts/build_daily_digest_selection.yaml
    build_daily_digest_rendering: ./config/runtime/mode-contracts/build_daily_digest_rendering.yaml
    review_digest: ./config/runtime/mode-contracts/review_digest.yaml
    build_weekly_digest_aggregation: ./config/runtime/mode-contracts/build_weekly_digest_aggregation.yaml
    build_weekly_digest_trends: ./config/runtime/mode-contracts/build_weekly_digest_trends.yaml
  mode_fixtures:
    monitor_sources_shortlist: ./config/runtime/mode-fixtures/monitor_sources_shortlist.yaml
    monitor_sources_duplicate_story: ./config/runtime/mode-fixtures/monitor_sources_duplicate_story.yaml
    scrape_and_enrich_non_shortlisted_guard: ./config/runtime/mode-fixtures/scrape_and_enrich_non_shortlisted_guard.yaml
    scrape_and_enrich_adapter_resolution: ./config/runtime/mode-fixtures/scrape_and_enrich_adapter_resolution.yaml
    scrape_and_enrich_full_body: ./config/runtime/mode-fixtures/scrape_and_enrich_full_body.yaml
    scrape_and_enrich_paywall_stub: ./config/runtime/mode-fixtures/scrape_and_enrich_paywall_stub.yaml
    scrape_and_enrich_snippet_fallback: ./config/runtime/mode-fixtures/scrape_and_enrich_snippet_fallback.yaml
    build_daily_digest_repeated_story: ./config/runtime/mode-fixtures/build_daily_digest_repeated_story.yaml
    build_daily_digest_contextual_continuation: ./config/runtime/mode-fixtures/build_daily_digest_contextual_continuation.yaml
    build_daily_digest_render_top_and_weak: ./config/runtime/mode-fixtures/build_daily_digest_render_top_and_weak.yaml
    build_daily_digest_parity_window: ./config/runtime/mode-fixtures/build_daily_digest_parity_window.yaml
    review_digest_seeded_omission: ./config/runtime/mode-fixtures/review_digest_seeded_omission.yaml
    review_digest_seeded_duplication: ./config/runtime/mode-fixtures/review_digest_seeded_duplication.yaml
    review_digest_clean_case: ./config/runtime/mode-fixtures/review_digest_clean_case.yaml
    build_weekly_digest_full_week: ./config/runtime/mode-fixtures/build_weekly_digest_full_week.yaml
    build_weekly_digest_short_history: ./config/runtime/mode-fixtures/build_weekly_digest_short_history.yaml
    build_weekly_digest_trend_clusters: ./config/runtime/mode-fixtures/build_weekly_digest_trend_clusters.yaml
    build_weekly_digest_limited_history_trends: ./config/runtime/mode-fixtures/build_weekly_digest_limited_history_trends.yaml
  stakeholder_profiles_index: ./config/runtime/stakeholder-profiles/index.yaml
  stakeholder_profiles_dir: ./config/runtime/stakeholder-profiles
