project:
  name: proptech-news-monitor
  timezone: Europe/Moscow
  audience: "Avito Real Estate"

schedule:
  weekday_digest:
    enabled: true
    days: [MON, TUE, WED, THU, FRI]
    time: "09:00"
  weekly_digest:
    enabled: true
    days: [FRI]
    time: "17:00"
  breaking_alert:
    enabled: true
    priority_threshold: 85

sources:
  rss:
    - https://www.propmodo.com/feed/
    - https://www.inman.com/feed/
    - https://www.housingwire.com/feed/
  official_blogs:
    - https://www.zillow.com/research/
    - https://www.redfin.com/news/
    - https://www.rightmove.co.uk/news/
    - https://www.rea-group.com/about-us/news-and-insights/
  tracked_companies:
    - Zillow
    - Redfin
    - Realtor.com
    - CoStar
    - Rightmove
    - REA Group
    - Domain
    - Opendoor
    - Compass

filters:
  lookback_hours: 36
  max_raw_items_per_run: 100
  max_top_items: 5
  max_weak_signals: 4
  min_priority_for_digest: 55

scoring:
  weights:
    marketplace_relevance: 0.35
    event_scale: 0.25
    portability_to_avito: 0.20
    urgency: 0.10
    novelty: 0.10
  boost_topics:
    - ai_search
    - recommendations
    - paid_visibility
    - verified_listings
    - lead_qualification
    - rentals
    - developer_workflows

telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID
  parse_mode: Markdown
  disable_web_page_preview: true

output:
  language: ru
  style: concise
  include_sections:
    - top_news
    - what_to_watch
    - weak_signals
